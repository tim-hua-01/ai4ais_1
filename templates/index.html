<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi model chatting utility</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <h1>Multi model chatting utility</h1>
            </div>
            <div class="panel-count-selector">
                <label for="panelCount">Panels:</label>
                <select id="panelCount">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6" selected>6</option>
                </select>
            </div>
        </header>

        <div class="panels-grid grid-6" id="panelsGrid">
            <!-- Panels will be generated here by JavaScript -->
        </div>

        <div class="main-resize-handle"></div>

        <div class="input-section">
            <div class="global-input-container">
                <textarea
                    id="globalInput"
                    class="global-input"
                    placeholder="Enter your message here... (Cmd+Enter to send to all, Shift+Enter for newline)"
                    rows="3"
                ></textarea>
                <button id="sendAllBtn" class="btn btn-primary btn-lg">Send to All</button>
            </div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
